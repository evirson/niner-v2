spring:
  application:
    name: niner-api

  # A API conecta como niner_app (SEM BYPASSRLS) — P8. Overridable por env no compose.
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/niner_db}
    username: ${SPRING_DATASOURCE_USERNAME:niner_app}
    password: ${SPRING_DATASOURCE_PASSWORD:dev_app}

  # Migrations NÃO rodam pela app: são aplicadas como niner_owner pelo serviço
  # `flyway` do docker-compose (P8: a app nunca roda migration nem é dona de tabela).
  flyway:
    enabled: false

  # I/O de integração com marketplaces/gateway (§3.2).
  threads:
    virtual:
      enabled: true

  # Erros no formato Problem Details (RFC 9457).
  mvc:
    problemdetails:
      enabled: true

  # Upload de foto de produto (ADR-013) — arquivo bruto antes da normalização/redimensionamento.
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

# Config do Niner (JWT e trial). O segredo é HS256 (>=256 bits); em produção via secret manager.
niner:
  jwt:
    secret: ${NINER_JWT_SECRET:niner-dev-secret-troque-em-producao-0123456789abcdef}
    expiracao: PT8H            # validade do access token
    emissor: niner
  trial:
    dias: 60                   # trial sem cartão (D2 — revisto de 14 para 60 dias)
    plano: Profissional        # plano-base durante o trial (fallback: menor preço ativo)
  cors:
    origins:                   # fronts em dev (site/web/admin). Em prod: domínios reais.
      - http://localhost:5175
      - http://localhost:5173
      - http://localhost:5174
  storage:                     # object storage das fotos de produto (ADR-013)
    bucket: ${NINER_STORAGE_BUCKET:niner-erp-dev}
    # host vazio = GCS real (ADC/chave). Preenchido = emulador fake-gcs-server do compose,
    # SEM credencial (dev): NINER_STORAGE_HOST=http://localhost:4443 e nada mais — a base-url
    # herda o host automaticamente, então as URLs públicas das fotos já saem do emulador.
    host: ${NINER_STORAGE_HOST:}
    base-url: ${NINER_STORAGE_BASE_URL:${NINER_STORAGE_HOST:https://storage.googleapis.com}}
