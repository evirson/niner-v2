# docker-compose.yml (dev) — spec §3.5
# Infra de dados + API. Ordem de subida: db → flyway (migrations) → api.
# Os serviços web/admin/site entram quando os fronts forem scaffolded.
#
# Uso:
#   docker compose up -d db          # sobe o banco (bootstrap de roles roda no 1º init)
#   docker compose run --rm flyway   # aplica as migrations db/migration/ como niner_owner
#   docker compose up -d api         # sobe a API (conecta como niner_app, porta 8080)

name: niner

services:
  db:
    image: postgres:18
    container_name: niner-db
    environment:
      POSTGRES_DB: niner_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_postgres}   # 🔴 dev; produção via secret manager
    volumes:
      # postgres:18 mudou o VOLUME para /var/lib/postgresql (PGDATA=/var/lib/postgresql/18/docker)
      - pgdata:/var/lib/postgresql
      # 00_roles.sql roda uma única vez no primeiro init, como superusuário, já em niner_db
      - ./db/bootstrap:/docker-entrypoint-initdb.d:ro
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d niner_db"]
      interval: 5s
      timeout: 3s
      retries: 12

  # Flyway roda como niner_owner (P8: niner_app nunca roda migration nem é dono de tabela)
  flyway:
    image: flyway/flyway:11
    profiles: [migrate]
    depends_on:
      db: { condition: service_healthy }
    volumes:
      - ./db/migration:/flyway/sql:ro
    command: >-
      -url=jdbc:postgresql://db:5432/niner_db
      -user=niner_owner
      -password=${FLYWAY_OWNER_PASSWORD:-dev_owner}
      -connectRetries=10
      migrate

  # API Niner (Spring Boot 4 / Java 25). Conecta como niner_app (SEM BYPASSRLS, P8).
  # As migrations devem ter sido aplicadas antes: `docker compose run --rm flyway`.
  api:
    build: ./api
    container_name: niner-api
    depends_on:
      db: { condition: service_healthy }
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/niner_db
      SPRING_DATASOURCE_USERNAME: niner_app
      SPRING_DATASOURCE_PASSWORD: ${DB_APP_PASSWORD:-dev_app}
    ports: ["8080:8080"]

  # pgAdmin — cliente web para inspecionar o niner_db em dev. Perfil `tools` (não sobe por padrão).
  #   docker compose --profile tools up -d pgadmin   → http://localhost:5050
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: niner-pgadmin
    profiles: [tools]
    depends_on:
      db: { condition: service_healthy }
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-dev@niner.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-dev_pgadmin}
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    ports: ["5050:80"]

  # Site público (Astro/SSG, SEO — ADR-011). Dev server na 5175. Perfil `fronts`.
  # A base-URL da API é lida em runtime (site/public/config.js).
  site:
    image: node:26-alpine
    profiles: [fronts]
    working_dir: /app
    volumes:
      - ./site:/app
    command: sh -c "npm install && npm run dev -- --host"
    ports: ["5175:5175"]

  # App do ERP do lojista (React + Vite). Dev server na 5173. Perfil `fronts`.
  web:
    image: node:26-alpine
    profiles: [fronts]
    working_dir: /app
    volumes:
      - ./web:/app
    command: sh -c "npm install && npm run dev -- --host"
    ports: ["5173:5173"]

volumes:
  pgdata:
  pgadmin-data:
